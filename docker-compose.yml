services:
  # PostgreSQL 数据库服务 (带 pgvector 插件，支持向量检索)
  db:
    # 使用 pgvector 镜像，PG 18
    image: pgvector/pgvector:pg18-bookworm
    container_name: xpouch-postgres
    restart: always
    # 当前仓库内的 compose 主要用于本地开发 / 联调，因此默认暴露 5432 到宿主机。
    # 生产环境请通过独立部署脚本或覆盖配置移除此映射，不要直接照搬本文件。
    ports:
      - "5432:5432"
    volumes:
      # PG 18+ 新格式：挂载到 /var/lib/postgresql（非 data 子目录）
      - ./postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # 后端服务
  backend:
    build: ./backend
    container_name: xpouch-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      # 容器内后端固定监听 3000；本地直跑 backend/main.py 时可使用 backend/.env 中的 3002
      - PORT=3000
      # Docker Compose 场景下由 compose 显式注入数据库连接，避免与 backend/.env 形成歧义
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: xpouch-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
