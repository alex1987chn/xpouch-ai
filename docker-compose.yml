services:
  # PostgreSQL 数据库服务 (带 pgvector 插件，支持向量检索)
  db:
    # ✅ 使用 pgvector 镜像，固定版本 0.8.2 修复 CVE-2026-3172
    image: pgvector/pgvector:0.8.2-pg15
    container_name: xpouch-postgres
    restart: always
    # 生产默认不对外暴露数据库端口；如需本机调试，可临时恢复 "5432:5432" 映射
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # 后端服务
  backend:
    build: ./backend
    container_name: xpouch-backend
    restart: always
    # 变量来源说明（按最终生效优先级）:
    # 1) environment（当前服务内显式声明，最高优先级）
    # 2) env_file: ./backend/.env（业务密钥与后端运行配置）
    # 3) 根目录 .env（仅供 compose 在解析 ${...} 时插值）
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      # 容器内后端数据库连接的最终来源（覆盖 backend/.env 里同名 DATABASE_URL）
      # compose 会将服务名 db 解析为内部网络地址
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

    # 注：生产环境如需 gunicorn，请先在 Dockerfile 中确保 gunicorn 在 PATH 中
    # 当前使用 Dockerfile 默认的 uvicorn 命令
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: xpouch-frontend
    restart: always
    ports:
      # 映射到宿主机的 8080 端口，配合宿主机 Nginx 使用
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
