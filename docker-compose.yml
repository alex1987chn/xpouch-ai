services:
  # PostgreSQL 数据库服务 (带 pgvector 插件，支持向量检索)
  db:
    # 使用 pgvector 镜像，PG 18
    image: pgvector/pgvector:pg18-bookworm
    container_name: xpouch-postgres
    restart: always
    # 生产默认不对外暴露数据库端口；如需本机调试，可临时恢复 "5432:5432" 映射
    ports:
      - "5432:5432"
    volumes:
      # PG 18+ 新格式：挂载到 /var/lib/postgresql（非 data 子目录）
      - ./postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # 后端服务
  backend:
    build: ./backend
    container_name: xpouch-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: xpouch-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
