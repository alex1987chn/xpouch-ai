name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: xpouch_test
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: xpouch_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run all backend tests
        env:
          # 使用 CI 服务中的 PostgreSQL
          DATABASE_URL: postgresql+psycopg://xpouch_test:test_pass@localhost:5432/xpouch_test
          # Mock API keys for tests
          MINIMAX_API_KEY: test-key
          DEEPSEEK_API_KEY: test-key
          MOONSHOT_API_KEY: test-key
          SILICON_API_KEY: test-key
          JWT_SECRET_KEY: test-secret-key-for-ci-only
        run: uv run pytest tests/

  frontend-check:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
